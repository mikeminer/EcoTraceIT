<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f4f1e8"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="#183c2d">Checkout Carbon Neutral</text>
  <text x="120" y="165" font-family="Arial, sans-serif" font-size="26" fill="#587064">Checkout UI Extension di EcoTraceIT</text>
  <rect x="120" y="225" width="1360" height="550" rx="30" fill="#fff" stroke="#d9ded8" stroke-width="3"/>
  <g transform="translate(190 300)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="30" font-weight="700" fill="#183c2d">Impatto ambientale della spedizione</text>
    <text x="0" y="60" font-size="25" fill="#4f645a">Stima per questo ordine</text>
    <text x="0" y="125" font-size="56" font-weight="700" fill="#183c2d">2,4 kg CO₂e</text>
    <rect x="0" y="175" width="1220" height="1" fill="#d9ded8"/>
    <rect x="0" y="225" width="38" height="38" rx="8" fill="#fff" stroke="#183c2d" stroke-width="3"/>
    <path d="m8 19 8 8 15-18" fill="none" stroke="#183c2d" stroke-width="4" stroke-linecap="round"/>
    <text x="60" y="254" font-size="29" font-weight="700" fill="#183c2d">Rendi questo ordine Carbon Neutral</text>
    <text x="60" y="300" font-size="23" fill="#4f645a">Aggiungi una compensazione verificabile calcolata sulla stima CO₂e.</text>
    <rect x="0" y="350" width="1220" height="76" rx="14" fill="#edf4e9"/>
    <text x="28" y="398" font-size="23" fill="#183c2d">✓ La scelta viene salvata sull’ordine e mostrata nei report EcoTraceIT</text>
  </g>
  <text x="120" y="835" font-family="Arial, sans-serif" font-size="22" fill="#66796f">Disponibile nei piani Pro ed Enterprise; la visualizzazione dipende dall’idoneità Shopify Checkout Extensibility dello store.</text>
</svg>
