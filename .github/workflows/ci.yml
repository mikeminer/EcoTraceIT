on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: CI

env:
  # Prisma validate only parses this URL; CI does not connect to a database.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecotraceit?schema=public

jobs:
  CI:
    name: Node 24 and npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'javascript') }}
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma
        run: npx prisma generate && npx prisma validate

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
